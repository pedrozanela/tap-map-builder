bundle:
  name: tap-map-builder

variables:
  catalog:
    description: Unity Catalog name
    default: pedro_zanela
  schema:
    description: Schema for TAP Map tables
    default: tap
  warehouse_id:
    description: SQL Warehouse ID (serverless recommended)
    default: e9b34f7a2e4b0561
  secret_scope:
    description: Databricks secret scope for Gmail credentials
    default: pedro-zanela-scope
  gmail_secret_sender:
    description: Secret key for Gmail sender address
    default: tap-map-gmail-sender
  gmail_secret_password:
    description: Secret key for Gmail App Password
    default: tap-map-gmail-password

targets:
  dev:
    default: true
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
      profile: DEFAULT

  fevm:
    workspace:
      host: https://fevm-fevm-pzanela-classic-aws.cloud.databricks.com
      profile: fe-vm-fevm-pzanela-classic-aws
    variables:
      catalog: fevm_pzanela_classic_aws_catalog
      warehouse_id: "d2f6f6ac2df3b9ef"
      secret_scope: pedro-zanela-scope

resources:
  apps:
    tap-map:
      name: tap-latam
      description: "TAP Map Builder — TAM, Architecture, Powerbase mapping"
      source_code_path: .
      config:
        command:
          - python
          - -m
          - uvicorn
          - app:app
          - --host
          - 0.0.0.0
          - --port
          - "8000"
        env:
          - name: TAP_CATALOG
            value: ${var.catalog}
          - name: TAP_SCHEMA
            value: ${var.schema}
          - name: DATABRICKS_WAREHOUSE_ID
            value_from: sql-warehouse
          - name: GMAIL_SENDER
            value_from: gmail-sender
          - name: GMAIL_APP_PASSWORD
            value_from: gmail-password
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
        - name: gmail-sender
          secret:
            scope: ${var.secret_scope}
            key: ${var.gmail_secret_sender}
            permission: READ
        - name: gmail-password
          secret:
            scope: ${var.secret_scope}
            key: ${var.gmail_secret_password}
            permission: READ
