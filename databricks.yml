bundle:
  name: tap-map-builder

variables:
  catalog:
    description: Unity Catalog name
    default: pedro_zanela
  schema:
    description: Schema for TAP Map tables
    default: tap
  warehouse_id:
    description: SQL Warehouse ID (serverless recommended)
    default: e9b34f7a2e4b0561
  secret_scope:
    description: Databricks secret scope for Gmail credentials
    default: pedro-zanela-scope
  gmail_secret_sender:
    description: Secret key for Gmail sender address
    default: tap-map-gmail-sender
  gmail_secret_password:
    description: Secret key for Gmail App Password
    default: tap-map-gmail-password

targets:
  dev:
    default: true
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
      profile: DEFAULT

  # Example: deploy to another workspace
  # prod:
  #   workspace:
  #     host: https://your-other-workspace.cloud.databricks.com
  #     profile: OTHER_PROFILE
  #   variables:
  #     catalog: other_catalog
  #     warehouse_id: other-warehouse-id
  #     secret_scope: other-scope

resources:
  jobs:
    salesforce-replication:
      name: "TAP Map — Salesforce Replication (D-1)"
      schedule:
        quartz_cron_expression: "0 0 9 * * ?"  # 09:00 UTC = 06:00 BRT
        timezone_id: America/Sao_Paulo
      tasks:
        - task_key: replicate
          notebook_task:
            notebook_path: ./notebooks/replicate_salesforce.py
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"
              spark.databricks.cluster.profile: singleNode
            node_type_id: i3.xlarge
            custom_tags:
              ResourceClass: SingleNode
      email_notifications:
        on_failure:
          - pedro.zanela@databricks.com

  apps:
    tap-map:
      name: tap-latam
      description: "TAP Map Builder — TAM, Architecture, Powerbase mapping"
      # Required: workaround for Terraform provider bug with budget_policy_id
      budget_policy_id: "5b62fa02-8671-46d3-96ac-64c1725dc9d9"
      source_code_path: .
      config:
        command:
          - python
          - -m
          - uvicorn
          - app:app
          - --host
          - 0.0.0.0
          - --port
          - "8000"
        env:
          - name: TAP_CATALOG
            value: ${var.catalog}
          - name: TAP_SCHEMA
            value: ${var.schema}
          - name: DATABRICKS_WAREHOUSE_ID
            value_from: sql-warehouse
          - name: GMAIL_SENDER
            value_from: gmail-sender
          - name: GMAIL_APP_PASSWORD
            value_from: gmail-password
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
        - name: gmail-sender
          secret:
            scope: ${var.secret_scope}
            key: ${var.gmail_secret_sender}
            permission: READ
        - name: gmail-password
          secret:
            scope: ${var.secret_scope}
            key: ${var.gmail_secret_password}
            permission: READ
